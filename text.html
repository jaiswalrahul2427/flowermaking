<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <canvas id="canvas"></canvas>
        <div class="name">
            <span>
                Click To Add Flowers
            </span>
        </div>
        <div class="render-toggle">
            freeze
        </div>
    </div>
    <script type="module" src="script.js"></script>

    <script type="x-shader/x-fragment" id="fragmentShader">
    uniform float u_ratio;
    uniform vec2 u_point;
    uniform float u_time;
    uniform float u_stop_time;
    uniform vec3 u_stop_randomizer;
    uniform sampler2D u_texture;
    uniform vec3 u_background_color;

    varying vec2 vUv;

    #define PI 3.14159265359

    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec3 permute(vec3 x) { return mod289(((x * 34.0) + 1.0) * x); }
    float snoise(vec2 v) {
        const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
        vec2 i = floor(v + dot(v, C.yy));
        vec2 x0 = v - i + dot(i, C.xx);
        vec2 i1;
        i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
        vec4 x12 = x0.xyxy + C.xxzz;
        x12.xy -= i1;
        i = mod289(i);
        vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
        vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0);
        m = m * m;
        m = m * m;
        vec3 x = 2.0 * fract(p * C.www) - 1.0;
        vec3 h = abs(x) - 0.5;
        vec3 ox = floor(x + 0.5);
        vec3 a0 = x - ox;
        m *= 1.79284291400159 - 0.85373472095314 * (a0 * a0 + h * h);
        vec3 g;
        g.x = a0.x * x0.x + h.x * x0.y;
        g.yz = a0.yz * x12.xz + h.yz * x12.yw;
        return 130.0 * dot(m, g);
    }

    float get_dot_shape(vec2 dist, float radius_max, float radius_line) {
        return 1. - smoothstep(radius_line * radius_max, radius_max, dot(dist, dist) * 4.0);
    }

	
    float get_stem_shape(vec2 _cursor, vec2 _uv, float _t, float _size, float _flowery, vec2 _rand) {

        float stroke_width = .01;
        float noise_power = .2;

        float cursor_horizontal_noise = noise_power * (1. + (1. - _flowery)) * snoise(3. * _uv * (_rand - .5));

        // noise to zero on flower center
        cursor_horizontal_noise *= pow(dot(_cursor.y, _cursor.y), .3 * _flowery);
        cursor_horizontal_noise *= pow(dot(_uv.y, _uv.y), .3);// moise to be zero at bottom
        _cursor.x += cursor_horizontal_noise;

        // non-flowers shorter
        _cursor.y *= (1. - ((1. - _flowery) * .7));
        _cursor.y += ((1. - _flowery) * .7 * _rand.x);

        // non-flowers wider
        stroke_width = (1. - _flowery) * .9 * pow(dot(_uv.y, _cursor.x), 1.) + _flowery * .03;
        stroke_width -= .02;

        float left = smoothstep(-stroke_width, 0., _cursor.x);
        float right = smoothstep(stroke_width, 0., _cursor.x);
        float stem_shape = left * right;

        float stem_top_mask = smoothstep(_cursor.y - .1, _cursor.y, min(-.1, _t - 1.));

        // top ovary
        stem_shape *= stem_top_mask;
        stem_shape += .5 * get_dot_shape(_cursor + vec2(0., .02), .15 * _size, .5);
        stem_shape *= stem_top_mask;

        return stem_shape;
    }

    void main() {

        float speed = 1.3;
        float t = speed * u_stop_time;

        vec2 uv = vUv;
        uv += 0.00007 * snoise(vUv * 6.0 + vec2(0.0, 15.0 * cos(0.1 * u_time)));
        uv.y += 0.00005;

        vec3 color = texture2D(u_texture, uv).xyz;
        color += 0.0015 * u_background_color;

        vec2 cursor = uv - u_point.xy;
        cursor.x *= u_ratio;

        float base_radius = .02 + .2 * u_stop_randomizer.y;
        float grow_duration = .6;
        float grow_speed = 2. * speed;
        float bloom_duration = .3 * u_stop_randomizer.y;

        float is_open = step(.1, base_radius);

        if (t < grow_duration) {
            vec3 stem_color = u_background_color - normalize(vec3(.3, .5, .1));
            float stem_shape = get_stem_shape(cursor, uv, grow_speed * t, base_radius, 1., u_stop_randomizer.xy);
            stem_shape += get_stem_shape(cursor, uv, grow_speed * t, 0., 0., u_stop_randomizer.yz);
            stem_shape += get_stem_shape(cursor, uv, grow_speed * t, 0., 0., u_stop_randomizer.zy);
            vec3 stem = stem_shape * stem_color;
            color -= stem;
        }

        if (t < grow_duration + is_open * bloom_duration) {

            float blooming_time = max(0., pow(1.1 * t, 2.) - .05);
            float radius = base_radius * blooming_time;

            vec2 noisy_cursor = vUv - u_point.xy;
            noisy_cursor.x *= u_ratio;
            noisy_cursor.y *= (1. + u_stop_randomizer.y * is_open);
            noisy_cursor -= .015 * snoise(noisy_cursor * 8. + vec2(0., 8. * sin(.5 * t + PI)));

            // China rose - densely layered petals
            float dist = length(noisy_cursor);
            float angle = atan(noisy_cursor.y, noisy_cursor.x);
            
            // Multiple petal waves for dense layering
            float petal_layer1 = abs(sin(angle * 5.0)) * abs(sin(angle * 3.0));
            float petal_layer2 = abs(sin(angle * 7.0)) * abs(sin(angle * 2.0));
            float petal_waves = mix(petal_layer1, petal_layer2, 0.5);
            
            // Create layered effect with distance
            float layer1 = smoothstep(1.4 * radius, 0.8 * radius, dist) * smoothstep(0.8 * radius, 1.5 * radius, dist);
            float layer2 = smoothstep(0.9 * radius, 0.4 * radius, dist) * smoothstep(0.4 * radius, 1.0 * radius, dist);
            float layer3 = smoothstep(0.5 * radius, 0.1 * radius, dist) * smoothstep(0.1 * radius, 0.6 * radius, dist);
            
            // Combine layers with petal texture
            float petals = layer1 * (0.7 + 0.3 * petal_waves) 
                         + layer2 * (0.8 + 0.2 * petal_layer1)
                         + layer3 * (0.9 + 0.1 * petal_layer2);
            
            // China rose colors - deep red/pink
            vec3 rose_outer = u_background_color - normalize(vec3(.8, .1, .2));
            vec3 rose_mid = u_background_color - normalize(vec3(.9, .15, .35));
            vec3 rose_inner = u_background_color - normalize(vec3(.95, .2, .45));
            
            // Apply layered coloring
            vec3 rose_color = mix(rose_outer, mix(rose_mid, rose_inner, smoothstep(0.5 * radius, 0.1 * radius, dist)), smoothstep(1.4 * radius, 0.4 * radius, dist));
            
            color -= 0.65 * petals * rose_color;
            
            // Center depth
            float center_mask = smoothstep(0.2 * radius, 0.0, dist);
            color -= 0.3 * center_mask * (rose_inner * 1.3);
            
            // Subtle highlights on petal edges
            color += 0.08 * blooming_time * petal_waves * smoothstep(1.5 * radius, 0.9 * radius, dist);
        }

        gl_FragColor = vec4(color, 1.0);
    }
</script>
    <script type="x-shader/x-vertex" id="vertexShader">
    varying vec2 vUv;
    void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.);
    }
</script>
</body>

</html>
